# V-Model Extension Configuration
# Reference: .specify/extensions/v-model/docs/v-model-config.md
#
# Domain: empty string = non-regulated mode.
# Sous Chef is a consumer recipe app — no safety-critical sections
# (MC/DC, MISRA-C, WCET, FFI, ASIL decomposition) are appropriate.
# Regulated values (iso_26262, do_178c, iec_62304) are intentionally NOT used.
domain: ''

# Directory where V-Model artifacts are stored (relative to specs/{feature}/)
output_dir: 'v-model'

# ID prefixes for traceable artifacts
id_prefixes:
    requirements: 'REQ'
    test_cases: 'ATP'
    scenarios: 'SCN'
    system_components: 'SYS'
    system_test_procedures: 'STP'
    system_test_steps: 'STS'
    architecture_modules: 'ARCH'
    integration_test_procedures: 'ITP'
    integration_test_steps: 'ITS'
    module_designs: 'MOD'
    unit_test_procedures: 'UTP'
    unit_test_scenarios: 'UTS'
    hazards: 'HAZ'

# Minimum coverage percentage required for validation gate to pass
coverage_threshold: 100

# Number of requirements to process per batch in acceptance generation
batch_size: 5

# Requirement categories to include
categories:
    functional: true
    non_functional: true
    interface: true
    constraint: true

# Verification methods available
verification_methods:
    - 'Test'
    - 'Inspection'
    - 'Analysis'
    - 'Demonstration'
