installed:
- agent-context
- product-forge
- v-model
settings:
  auto_execute_hooks: true
hooks:
  after_tasks:
  - extension: v-model
    command: speckit.v-model.trace
    enabled: true
    optional: true
    prompt: Run traceability matrix to validate requirement coverage?
    description: Builds the traceability matrix after tasks are generated
    condition: null
  after_specify:
  - extension: agent-context
    command: speckit.agent-context.update
    enabled: true
    optional: true
    priority: 10
    prompt: Execute speckit.agent-context.update?
    description: Refresh agent context after specification
    condition: null
  after_plan:
  - extension: agent-context
    command: speckit.agent-context.update
    enabled: true
    optional: true
    priority: 10
    prompt: Execute speckit.agent-context.update?
    description: Refresh agent context after planning
    condition: null
