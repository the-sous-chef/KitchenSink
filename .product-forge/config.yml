# Product Forge Configuration — KitchenSink
# Generated 2026-05-10 during /speckit.product-forge.forge bootstrap for feature 011.

# ─── Project Identity ──────────────────────────────────────────────────────────
project_name: 'KitchenSink'
project_tech_stack: 'TypeScript 5.x + Node 24 + NestJS 11 + Drizzle ORM + Next.js (web) + Expo/React Native (mobile) + Auth0 + AWS (RDS/S3/SQS/Lambda) + CDK v2'
project_domain: 'cross-platform commise recipe & meal-planning app (web + mobile)'

# ─── Paths ─────────────────────────────────────────────────────────────────────
codebase_path: '.'
features_dir: 'specs'

# ─── SpecKit Integration ───────────────────────────────────────────────────────
default_speckit_mode: 'v-model'
constitution_path: '.specify/memory/constitution.md'

# ─── Research Defaults ─────────────────────────────────────────────────────────
default_competitors: []
default_tech_research: false
default_metrics_research: false

# ─── Product Spec Defaults ─────────────────────────────────────────────────────
default_wireframe_detail: 'basic-html'
default_mockup_style: 'project-styled'

# ─── Lifecycle Behavior ────────────────────────────────────────────────────────
progressive_verify_interval: 3
auto_sync_between_phases: true
