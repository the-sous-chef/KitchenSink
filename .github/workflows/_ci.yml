name: CI (reusable)

# Reusable CI pipeline, parameterized by `stage`. Called by ci-pr.yml (stage=sandbox) and
# ci-main.yml (stage=prod). All AWS/Clerk secret loading goes through the load-secrets composite
# action, which reads kitchensink/<stage>/auth/keys — so PR pipelines use sandbox secrets and the
# main pipeline uses prod secrets, with no duplicated secret-fetch logic.
#
# Hardening path (requires repo/IAM setup, see docs/CI_ARCHITECTURE.md): move AWS auth to OIDC with
# two stage-scoped roles and adopt GitHub Environments so prod secrets are unreachable from PR runs.

on:
    workflow_call:
        inputs:
            stage:
                description: Deployment stage — 'sandbox' (PRs) or 'prod' (main)
                required: true
                type: string

permissions:
    contents: read

env:
    DEFAULT_AWS_REGION: ${{ vars.DEFAULT_AWS_REGION }}

jobs:
    install:
        name: Install dependencies
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
            - uses: actions/setup-node@v6
              with:
                  node-version: 24
                  cache: npm
            - run: npm ci
            - name: Cache dependencies
              uses: actions/cache/save@v5
              with:
                  path: |
                      node_modules
                      packages/*/node_modules
                      packages/*/*/node_modules
                  key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}

    build-ui:
        name: Build @kitchensink/ui
        runs-on: ubuntu-latest
        needs: [install]
        steps:
            - uses: actions/checkout@v6
            - uses: actions/setup-node@v6
              with:
                  node-version: 24
                  cache: npm
            - name: Restore dependencies
              uses: actions/cache/restore@v5
              with:
                  path: |
                      node_modules
                      packages/*/node_modules
                      packages/*/*/node_modules
                  key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}
            - run: npm run build --workspace=@kitchensink/ui
            - name: Cache UI build artifacts
              uses: actions/cache/save@v5
              with:
                  path: packages/ui/dist
                  key: ${{ runner.os }}-ui-dist-${{ github.sha }}

    lint:
        name: Lint
        runs-on: ubuntu-latest
        needs: [install]
        steps:
            - uses: actions/checkout@v6
            - uses: actions/setup-node@v6
              with:
                  node-version: 24
                  cache: npm
            - name: Restore dependencies
              uses: actions/cache/restore@v5
              with:
                  path: |
                      node_modules
                      packages/*/node_modules
                      packages/*/*/node_modules
                  key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}
            - run: npx turbo run lint

    format:
        name: Format check
        runs-on: ubuntu-latest
        needs: [install]
        steps:
            - uses: actions/checkout@v6
            - uses: actions/setup-node@v6
              with:
                  node-version: 24
                  cache: npm
            - name: Restore dependencies
              uses: actions/cache/restore@v5
              with:
                  path: |
                      node_modules
                      packages/*/node_modules
                      packages/*/*/node_modules
                  key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}
            - run: npx turbo run format:check

    typecheck:
        name: Typecheck
        runs-on: ubuntu-latest
        needs: [install]
        steps:
            - uses: actions/checkout@v6
            - uses: actions/setup-node@v6
              with:
                  node-version: 24
                  cache: npm
            - name: Restore dependencies
              uses: actions/cache/restore@v5
              with:
                  path: |
                      node_modules
                      packages/*/node_modules
                      packages/*/*/node_modules
                  key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}
            - run: npx turbo run typecheck

    test:
        name: Test
        runs-on: ubuntu-latest
        needs: [install]
        steps:
            - uses: actions/checkout@v6
            - uses: actions/setup-node@v6
              with:
                  node-version: 24
                  cache: npm
            - name: Restore dependencies
              uses: actions/cache/restore@v5
              with:
                  path: |
                      node_modules
                      packages/*/node_modules
                      packages/*/*/node_modules
                  key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}
            - run: npx turbo run test

    build:
        name: Build ${{ matrix.workspace }}
        runs-on: ubuntu-latest
        needs: [install, build-ui]
        strategy:
            fail-fast: false
            matrix:
                workspace:
                    - '@kitchensink/identity-service'
                    - '@kitchensink/identity-webhooks'
                    - '@commise/web'
        steps:
            - uses: actions/checkout@v6
            - uses: actions/setup-node@v6
              with:
                  node-version: 24
                  cache: npm
            - name: Restore dependencies
              uses: actions/cache/restore@v5
              with:
                  path: |
                      node_modules
                      packages/*/node_modules
                      packages/*/*/node_modules
                  key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}
            - name: Restore UI build artifacts
              uses: actions/cache/restore@v5
              with:
                  path: packages/ui/dist
                  key: ${{ runner.os }}-ui-dist-${{ github.sha }}

            # The web build statically prerenders Clerk-wrapped pages and needs a real publishable
            # key. Load the stage-scoped key; if creds are unavailable (e.g. fork PRs) the build is
            # skipped rather than failing.
            - name: Load ${{ inputs.stage }} secrets
              if: matrix.workspace == '@commise/web'
              id: secrets
              continue-on-error: true
              uses: ./.github/actions/load-secrets
              with:
                  stage: ${{ inputs.stage }}
                  aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
                  aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
                  aws-region: ${{ env.DEFAULT_AWS_REGION }}

            - name: Build
              if: matrix.workspace != '@commise/web' || steps.secrets.outcome == 'success'
              run: npm run build --workspace=${{ matrix.workspace }}

    e2e-backend:
        name: E2E (${{ matrix.workspace }})
        runs-on: ubuntu-latest
        needs: build
        strategy:
            fail-fast: false
            matrix:
                workspace:
                    - '@kitchensink/identity-service'
                    - '@kitchensink/identity-webhooks'
        steps:
            - uses: actions/checkout@v6
            - uses: actions/setup-node@v6
              with:
                  node-version: 24
                  cache: npm
            - name: Restore dependencies
              uses: actions/cache/restore@v5
              with:
                  path: |
                      node_modules
                      packages/*/node_modules
                      packages/*/*/node_modules
                  key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}
            - name: Load ${{ inputs.stage }} secrets
              id: secrets
              continue-on-error: true
              uses: ./.github/actions/load-secrets
              with:
                  stage: ${{ inputs.stage }}
                  aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
                  aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
                  aws-region: ${{ env.DEFAULT_AWS_REGION }}
            - name: Run e2e tests
              if: steps.secrets.outcome == 'success'
              run: npm run test:e2e --workspace=${{ matrix.workspace }}

    e2e-web:
        name: E2E (web — Playwright)
        runs-on: ubuntu-latest
        needs: build
        steps:
            - uses: actions/checkout@v6
            - uses: actions/setup-node@v6
              with:
                  node-version: 24
                  cache: npm
            - name: Restore dependencies
              uses: actions/cache/restore@v5
              with:
                  path: |
                      node_modules
                      packages/*/node_modules
                      packages/*/*/node_modules
                  key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}
            - name: Load ${{ inputs.stage }} secrets
              id: secrets
              continue-on-error: true
              uses: ./.github/actions/load-secrets
              with:
                  stage: ${{ inputs.stage }}
                  aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
                  aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
                  aws-region: ${{ env.DEFAULT_AWS_REGION }}
            - name: Install Playwright browsers
              if: steps.secrets.outcome == 'success'
              run: npx playwright install chromium
            - name: Run web e2e tests
              if: steps.secrets.outcome == 'success'
              run: npm run test:e2e --workspace=@commise/web

    e2e-mobile:
        name: E2E (mobile — Vitest)
        runs-on: ubuntu-latest
        needs: build
        steps:
            - uses: actions/checkout@v6
            - uses: actions/setup-node@v6
              with:
                  node-version: 24
                  cache: npm
            - name: Restore dependencies
              uses: actions/cache/restore@v5
              with:
                  path: |
                      node_modules
                      packages/*/node_modules
                      packages/*/*/node_modules
                  key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}
            - name: Load ${{ inputs.stage }} secrets
              id: secrets
              continue-on-error: true
              uses: ./.github/actions/load-secrets
              with:
                  stage: ${{ inputs.stage }}
                  aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
                  aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
                  aws-region: ${{ env.DEFAULT_AWS_REGION }}
            - name: Run mobile e2e tests
              if: steps.secrets.outcome == 'success'
              run: npm run test:e2e --workspace=@commise/mobile
