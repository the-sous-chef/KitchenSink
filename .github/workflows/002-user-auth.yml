name: Identity CI — 002-user-auth

on:
    push:
        branches: [main, 002-user-auth]
        paths:
            - 'packages/services/identity/**'
            - 'packages/services/identity-webhooks/**'
            - 'packages/apps/sous-chef/web/**'
            - 'packages/apps/sous-chef/mobile/**'
            - 'packages/ui/**'
            - '.github/workflows/002-user-auth.yml'
            - 'package.json'
            - 'package-lock.json'
            - 'turbo.json'
    pull_request:
        paths:
            - 'packages/services/identity/**'
            - 'packages/services/identity-webhooks/**'
            - 'packages/apps/sous-chef/web/**'
            - 'packages/apps/sous-chef/mobile/**'
            - 'packages/ui/**'
            - '.github/workflows/002-user-auth.yml'
            - 'package.json'
            - 'package-lock.json'
            - 'turbo.json'

permissions:
    contents: read

env:
    AWS_REGION: us-east-1

concurrency:
    group: 002-user-auth-ci-${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    install:
        name: Install dependencies
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: 24
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Cache dependencies
              uses: actions/cache/save@v5
              with:
                  path: |
                      node_modules
                      packages/*/node_modules
                      packages/*/*/node_modules
                  key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}

    build-ui:
        name: Build @kitchensink/ui
        runs-on: ubuntu-latest
        needs: install
        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: 24
                  cache: npm

            - name: Restore dependencies
              uses: actions/cache/restore@v5
              with:
                  path: |
                      node_modules
                      packages/*/node_modules
                      packages/*/*/node_modules
                  key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}

            - name: Build @kitchensink/ui
              run: npm run build --workspace=@kitchensink/ui

            - name: Cache UI build artifacts
              uses: actions/cache/save@v5
              with:
                  path: packages/ui/dist
                  key: ${{ runner.os }}-ui-dist-${{ github.sha }}

    identity-workspace:
        name: ${{ matrix.workspace }}
        runs-on: ubuntu-latest
        needs: [install, build-ui]
        strategy:
            fail-fast: false
            matrix:
                include:
                    - workspace: '@kitchensink/identity-service'
                    - workspace: '@kitchensink/identity-webhooks'
                    - workspace: '@kitchensink/web'
                    - workspace: '@kitchensink/mobile'

        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: 24
                  cache: npm

            - name: Restore dependencies
              uses: actions/cache/restore@v5
              with:
                  path: |
                      node_modules
                      packages/*/node_modules
                      packages/*/*/node_modules
                  key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}

            - name: Restore UI build artifacts
              uses: actions/cache/restore@v5
              with:
                  path: packages/ui/dist
                  key: ${{ runner.os }}-ui-dist-${{ github.sha }}

            - name: Lint
              run: npm run lint --workspace=${{ matrix.workspace }}

            - name: Typecheck
              run: npm run typecheck --workspace=${{ matrix.workspace }}

            - name: Format check
              run: npm run format:check --workspace=${{ matrix.workspace }}

            - name: Test
              run: npm run test --workspace=${{ matrix.workspace }}

            - name: Configure AWS credentials
              if: matrix.workspace == '@kitchensink/web'
              id: aws-creds
              uses: aws-actions/configure-aws-credentials@v4
              with:
                  aws-access-key-id: ${{ vars.AWS_ACCESS_KEY_ID }}
                  aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
                  aws-region: ${{ env.AWS_REGION }}
              continue-on-error: true

            - name: Fetch Clerk keys from AWS Secrets Manager
              if: matrix.workspace == '@kitchensink/web' && steps.aws-creds.outcome == 'success'
              run: |
                  SECRET=$(aws secretsmanager get-secret-value --secret-id kitchensink/sandbox/auth/keys --query SecretString --output text)
                  PUBLISHABLE_KEY=$(echo "$SECRET" | jq -r '.publishableKey')
                  SECRET_KEY=$(echo "$SECRET" | jq -r '.secretKey')
                  echo "NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=$PUBLISHABLE_KEY" >> "$GITHUB_ENV"
                  echo "EXPO_PUBLIC_CLERK_PUBLISHABLE_KEY=$PUBLISHABLE_KEY" >> "$GITHUB_ENV"
                  echo "CLERK_SECRET_KEY=$SECRET_KEY" >> "$GITHUB_ENV"

            - name: Build
              if: matrix.workspace != '@kitchensink/mobile' && (matrix.workspace != '@kitchensink/web' || steps.aws-creds.outcome == 'success')
              run: npm run build --workspace=${{ matrix.workspace }}

    e2e-backend:
        name: E2E (${{ matrix.workspace }})
        runs-on: ubuntu-latest
        needs: identity-workspace
        strategy:
            fail-fast: false
            matrix:
                workspace:
                    - '@kitchensink/identity-service'
                    - '@kitchensink/identity-webhooks'
        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: 24
                  cache: npm

            - name: Restore dependencies
              uses: actions/cache/restore@v5
              with:
                  path: |
                      node_modules
                      packages/*/node_modules
                      packages/*/*/node_modules
                  key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}

            - name: Configure AWS credentials
              id: aws-creds
              uses: aws-actions/configure-aws-credentials@v4
              with:
                  aws-access-key-id: ${{ vars.AWS_ACCESS_KEY_ID }}
                  aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
                  aws-region: ${{ env.AWS_REGION }}
              continue-on-error: true

            - name: Fetch Clerk keys from AWS Secrets Manager
              if: steps.aws-creds.outcome == 'success'
              run: |
                  SECRET=$(aws secretsmanager get-secret-value --secret-id kitchensink/sandbox/auth/keys --query SecretString --output text)
                  PUBLISHABLE_KEY=$(echo "$SECRET" | jq -r '.publishableKey')
                  SECRET_KEY=$(echo "$SECRET" | jq -r '.secretKey')
                  echo "NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=$PUBLISHABLE_KEY" >> "$GITHUB_ENV"
                  echo "CLERK_SECRET_KEY=$SECRET_KEY" >> "$GITHUB_ENV"

            - name: Run e2e tests
              if: steps.aws-creds.outcome == 'success'
              run: npm run test:e2e --workspace=${{ matrix.workspace }}

    e2e-web:
        name: E2E (web — Playwright)
        runs-on: ubuntu-latest
        needs: identity-workspace
        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: 24
                  cache: npm

            - name: Restore dependencies
              uses: actions/cache/restore@v5
              with:
                  path: |
                      node_modules
                      packages/*/node_modules
                      packages/*/*/node_modules
                  key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}

            - name: Configure AWS credentials
              id: aws-creds
              uses: aws-actions/configure-aws-credentials@v4
              with:
                  aws-access-key-id: ${{ vars.AWS_ACCESS_KEY_ID }}
                  aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
                  aws-region: ${{ env.AWS_REGION }}
              continue-on-error: true

            - name: Fetch Clerk keys from AWS Secrets Manager
              if: steps.aws-creds.outcome == 'success'
              run: |
                  SECRET=$(aws secretsmanager get-secret-value --secret-id kitchensink/sandbox/auth/keys --query SecretString --output text)
                  PUBLISHABLE_KEY=$(echo "$SECRET" | jq -r '.publishableKey')
                  SECRET_KEY=$(echo "$SECRET" | jq -r '.secretKey')
                  echo "NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=$PUBLISHABLE_KEY" >> "$GITHUB_ENV"
                  echo "CLERK_SECRET_KEY=$SECRET_KEY" >> "$GITHUB_ENV"

            - name: Install Playwright browsers
              if: steps.aws-creds.outcome == 'success'
              run: npx playwright install chromium

            - name: Run web e2e tests
              if: steps.aws-creds.outcome == 'success'
              run: npm run test:e2e --workspace=@kitchensink/web

    e2e-mobile:
        name: E2E (mobile — Vitest)
        runs-on: ubuntu-latest
        needs: identity-workspace
        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: 24
                  cache: npm

            - name: Restore dependencies
              uses: actions/cache/restore@v5
              with:
                  path: |
                      node_modules
                      packages/*/node_modules
                      packages/*/*/node_modules
                  key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}

            - name: Configure AWS credentials
              id: aws-creds
              uses: aws-actions/configure-aws-credentials@v4
              with:
                  aws-access-key-id: ${{ vars.AWS_ACCESS_KEY_ID }}
                  aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
                  aws-region: ${{ env.AWS_REGION }}
              continue-on-error: true

            - name: Fetch Clerk keys from AWS Secrets Manager
              if: steps.aws-creds.outcome == 'success'
              run: |
                  SECRET=$(aws secretsmanager get-secret-value --secret-id kitchensink/sandbox/auth/keys --query SecretString --output text)
                  PUBLISHABLE_KEY=$(echo "$SECRET" | jq -r '.publishableKey')
                  SECRET_KEY=$(echo "$SECRET" | jq -r '.secretKey')
                  echo "EXPO_PUBLIC_CLERK_PUBLISHABLE_KEY=$PUBLISHABLE_KEY" >> "$GITHUB_ENV"
                  echo "CLERK_SECRET_KEY=$SECRET_KEY" >> "$GITHUB_ENV"

            - name: Run mobile e2e tests
              if: steps.aws-creds.outcome == 'success'
              run: npm run test:e2e --workspace=@kitchensink/mobile

    e2e-mobile-android:
        name: E2E (mobile Android — Maestro)
        runs-on: ubuntu-latest
        needs: identity-workspace
        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: 24
                  cache: npm

            - name: Restore dependencies
              uses: actions/cache/restore@v5
              with:
                  path: |
                      node_modules
                      packages/*/node_modules
                      packages/*/*/node_modules
                  key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}

            - name: Configure AWS credentials
              id: aws-creds
              uses: aws-actions/configure-aws-credentials@v4
              with:
                  aws-access-key-id: ${{ vars.AWS_ACCESS_KEY_ID }}
                  aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
                  aws-region: ${{ env.AWS_REGION }}
              continue-on-error: true

            - name: Fetch Clerk keys from AWS Secrets Manager
              if: steps.aws-creds.outcome == 'success'
              run: |
                  SECRET=$(aws secretsmanager get-secret-value --secret-id kitchensink/sandbox/auth/keys --query SecretString --output text)
                  PUBLISHABLE_KEY=$(echo "$SECRET" | jq -r '.publishableKey')
                  SECRET_KEY=$(echo "$SECRET" | jq -r '.secretKey')
                  echo "NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=$PUBLISHABLE_KEY" >> "$GITHUB_ENV"
                  echo "EXPO_PUBLIC_CLERK_PUBLISHABLE_KEY=$PUBLISHABLE_KEY" >> "$GITHUB_ENV"
                  echo "CLERK_SECRET_KEY=$SECRET_KEY" >> "$GITHUB_ENV"

            - name: Setup JDK 17
              if: steps.aws-creds.outcome == 'success'
              uses: actions/setup-java@v4
              with:
                  distribution: 'zulu'
                  java-version: '17'

            - name: Build Android APK
              if: steps.aws-creds.outcome == 'success'
              run: |
                  cd packages/apps/sous-chef/mobile
                  npx expo prebuild --platform android --clean
                  cd android
                  ./gradlew :app:assembleDebug

            - name: Install Maestro
              if: steps.aws-creds.outcome == 'success'
              run: |
                  curl -Ls "https://get.maestro.mobile.dev" | bash
                  echo "$HOME/.maestro/bin" >> $GITHUB_PATH

            - name: Setup Android Emulator
              if: steps.aws-creds.outcome == 'success'
              uses: reactivecircus/android-emulator-runner@v2
              with:
                  api-level: 34
                  target: google_apis
                  arch: x86_64
                  script: |
                      adb install packages/apps/sous-chef/mobile/android/app/build/outputs/apk/debug/app-debug.apk
                      maestro test packages/apps/sous-chef/mobile/.maestro/auth/login-flow-android.yaml

    e2e-mobile-ios:
        name: E2E (mobile iOS — Maestro)
        runs-on: macos-latest
        needs: identity-workspace
        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: 24
                  cache: npm

            - name: Restore dependencies
              uses: actions/cache/restore@v5
              with:
                  path: |
                      node_modules
                      packages/*/node_modules
                      packages/*/*/node_modules
                  key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}

            - name: Configure AWS credentials
              id: aws-creds
              uses: aws-actions/configure-aws-credentials@v4
              with:
                  aws-access-key-id: ${{ vars.AWS_ACCESS_KEY_ID }}
                  aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
                  aws-region: ${{ env.AWS_REGION }}
              continue-on-error: true

            - name: Fetch Clerk keys from AWS Secrets Manager
              if: steps.aws-creds.outcome == 'success'
              run: |
                  SECRET=$(aws secretsmanager get-secret-value --secret-id kitchensink/sandbox/auth/keys --query SecretString --output text)
                  PUBLISHABLE_KEY=$(echo "$SECRET" | jq -r '.publishableKey')
                  SECRET_KEY=$(echo "$SECRET" | jq -r '.secretKey')
                  echo "NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=$PUBLISHABLE_KEY" >> "$GITHUB_ENV"
                  echo "EXPO_PUBLIC_CLERK_PUBLISHABLE_KEY=$PUBLISHABLE_KEY" >> "$GITHUB_ENV"
                  echo "CLERK_SECRET_KEY=$SECRET_KEY" >> "$GITHUB_ENV"

            - name: Setup Xcode
              if: steps.aws-creds.outcome == 'success'
              uses: maxim-lobanov/setup-xcode@v1
              with:
                  xcode-version: latest-stable

            - name: Install CocoaPods
              if: steps.aws-creds.outcome == 'success'
              run: |
                  cd packages/apps/sous-chef/mobile
                  npx expo prebuild --platform ios --clean
                  cd ios
                  pod install --repo-update

            - name: Build iOS Simulator App
              if: steps.aws-creds.outcome == 'success'
              run: |
                  cd packages/apps/sous-chef/mobile/ios
                  xcodebuild -workspace SousChef.xcworkspace -scheme SousChef -sdk iphonesimulator -destination 'platform=iOS Simulator,name=iPhone 15' -derivedDataPath ./build

            - name: Install Maestro
              if: steps.aws-creds.outcome == 'success'
              run: |
                  curl -Ls "https://get.maestro.mobile.dev" | bash
                  echo "$HOME/.maestro/bin" >> $GITHUB_PATH

            - name: Run Maestro iOS Tests
              if: steps.aws-creds.outcome == 'success'
              run: |
                  maestro test packages/apps/sous-chef/mobile/.maestro/auth/login-flow-ios.yaml --device "iPhone 15"

    metric-gate:
        name: Test Distribution Metric Gate
        runs-on: ubuntu-latest
        needs: identity-workspace
        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: 24
                  cache: npm

            - name: Restore dependencies
              uses: actions/cache/restore@v5
              with:
                  path: |
                      node_modules
                      packages/*/node_modules
                      packages/*/*/node_modules
                  key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}

            - name: Configure AWS credentials
              id: aws-creds
              uses: aws-actions/configure-aws-credentials@v4
              with:
                  aws-access-key-id: ${{ vars.AWS_ACCESS_KEY_ID }}
                  aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
                  aws-region: ${{ env.AWS_REGION }}
              continue-on-error: true

            - name: Fetch Clerk keys from AWS Secrets Manager
              if: steps.aws-creds.outcome == 'success'
              run: |
                  SECRET=$(aws secretsmanager get-secret-value --secret-id kitchensink/sandbox/auth/keys --query SecretString --output text)
                  PUBLISHABLE_KEY=$(echo "$SECRET" | jq -r '.publishableKey')
                  SECRET_KEY=$(echo "$SECRET" | jq -r '.secretKey')
                  echo "NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=$PUBLISHABLE_KEY" >> "$GITHUB_ENV"
                  echo "EXPO_PUBLIC_CLERK_PUBLISHABLE_KEY=$PUBLISHABLE_KEY" >> "$GITHUB_ENV"
                  echo "CLERK_SECRET_KEY=$SECRET_KEY" >> "$GITHUB_ENV"

            - name: Verify test coverage meets threshold
              if: steps.aws-creds.outcome == 'success'
              run: |
                  # Minimum 1 test per user story (12 US, excluding OOS US-011 = 11)
                  MIN_TESTS=11
                  TOTAL=$(npm test 2>&1 | grep -oP '\d+(?= passed)' | awk '{s+=$1} END {print s}')
                  echo "Total tests: $TOTAL"
                  if [ "$TOTAL" -lt "$MIN_TESTS" ]; then
                      echo "FAIL: $TOTAL tests < $MIN_TESTS minimum"
                      exit 1
                  fi
                  echo "PASS: $TOTAL tests >= $MIN_TESTS minimum"
