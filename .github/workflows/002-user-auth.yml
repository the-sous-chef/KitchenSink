name: Identity CI — 002-user-auth

on:
    push:
        branches: [main, 002-user-auth]
        paths:
            - 'packages/services/identity/**'
            - 'packages/services/identity-webhooks/**'
            - 'packages/apps/sous-chef/web/**'
            - 'packages/apps/sous-chef/mobile/**'
            - '.github/workflows/002-user-auth.yml'
            - 'package.json'
            - 'package-lock.json'
            - 'turbo.json'
    pull_request:
        paths:
            - 'packages/services/identity/**'
            - 'packages/services/identity-webhooks/**'
            - 'packages/apps/sous-chef/web/**'
            - 'packages/apps/sous-chef/mobile/**'
            - '.github/workflows/002-user-auth.yml'
            - 'package.json'
            - 'package-lock.json'
            - 'turbo.json'

permissions:
    contents: read

env:
    AWS_REGION: us-east-1
    NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_ZXhhbXBsZS5jbGVyay5hY2NvdW50cy5kZXYk
    EXPO_PUBLIC_IDP_PUBLISHABLE_KEY: pk_test_ZXhhbXBsZS5jbGVyay5hY2NvdW50cy5kZXYk
    CLERK_SECRET_KEY: sk_test_dummy

concurrency:
    group: 002-user-auth-ci-${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    install:
        name: Install dependencies
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: 24
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Cache dependencies
              uses: actions/cache/save@v5
              with:
                  path: |
                      node_modules
                      packages/*/node_modules
                      packages/*/*/node_modules
                  key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}

    identity-workspace:
        name: ${{ matrix.workspace }}
        runs-on: ubuntu-latest
        needs: install
        strategy:
            fail-fast: false
            matrix:
                include:
                    - workspace: '@kitchensink/identity-service'
                    - workspace: '@kitchensink/identity-webhooks'
                    - workspace: '@kitchensink/web'
                    - workspace: '@kitchensink/mobile'

        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: 24
                  cache: npm

            - name: Restore dependencies
              uses: actions/cache/restore@v5
              with:
                  path: |
                      node_modules
                      packages/*/node_modules
                      packages/*/*/node_modules
                  key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}

            - name: Lint
              run: npm run lint --workspace=${{ matrix.workspace }}

            - name: Typecheck
              run: npm run typecheck --workspace=${{ matrix.workspace }}

            - name: Format check
              run: npm run format:check --workspace=${{ matrix.workspace }}

            - name: Test
              run: npm run test --workspace=${{ matrix.workspace }}

            - name: Build
              run: npm run build --workspace=${{ matrix.workspace }}

    e2e-backend:
        name: E2E (${{ matrix.workspace }})
        runs-on: ubuntu-latest
        needs: identity-workspace
        strategy:
            fail-fast: false
            matrix:
                workspace:
                    - '@kitchensink/identity-service'
                    - '@kitchensink/identity-webhooks'
        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: 24
                  cache: npm

            - name: Restore dependencies
              uses: actions/cache/restore@v5
              with:
                  path: |
                      node_modules
                      packages/*/node_modules
                      packages/*/*/node_modules
                  key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}

            - name: Run e2e tests
              run: npm run test:e2e --workspace=${{ matrix.workspace }}

    e2e-web:
        name: E2E (web — Playwright)
        runs-on: ubuntu-latest
        needs: identity-workspace
        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: 24
                  cache: npm

            - name: Restore dependencies
              uses: actions/cache/restore@v5
              with:
                  path: |
                      node_modules
                      packages/*/node_modules
                      packages/*/*/node_modules
                  key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}

            - name: Install Playwright browsers
              run: npx playwright install chromium

            - name: Run web e2e tests
              run: npm run test:e2e --workspace=@kitchensink/web

    e2e-mobile:
        name: E2E (mobile — Vitest)
        runs-on: ubuntu-latest
        needs: identity-workspace
        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: 24
                  cache: npm

            - name: Restore dependencies
              uses: actions/cache/restore@v5
              with:
                  path: |
                      node_modules
                      packages/*/node_modules
                      packages/*/*/node_modules
                  key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}

            - name: Run mobile e2e tests
              run: npm run test:e2e --workspace=@kitchensink/mobile

    metric-gate:
        name: Test Distribution Metric Gate
        runs-on: ubuntu-latest
        needs: identity-workspace
        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: 24
                  cache: npm

            - name: Restore dependencies
              uses: actions/cache/restore@v5
              with:
                  path: |
                      node_modules
                      packages/*/node_modules
                      packages/*/*/node_modules
                  key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}

            - name: Install dependencies
              run: npm ci

            - name: Verify test coverage meets threshold
              run: |
                  # Minimum 1 test per user story (12 US, excluding OOS US-011 = 11)
                  MIN_TESTS=11
                  TOTAL=$(npm test 2>&1 | grep -oP '\d+(?= passed)' | awk '{s+=$1} END {print s}')
                  echo "Total tests: $TOTAL"
                  if [ "$TOTAL" -lt "$MIN_TESTS" ]; then
                      echo "FAIL: $TOTAL tests < $MIN_TESTS minimum"
                      exit 1
                  fi
                  echo "PASS: $TOTAL tests >= $MIN_TESTS minimum"
