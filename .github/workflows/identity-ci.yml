name: Identity CI

on:
    push:
        branches: [main, 002-user-auth]
        paths:
            - 'packages/services/identity/**'
            - 'packages/services/identity-webhooks/**'
            - 'packages/apps/sous-chef/web/**'
            - 'packages/apps/sous-chef/mobile/**'
            - '.github/workflows/identity-ci.yml'
            - 'package.json'
            - 'package-lock.json'
            - 'turbo.json'
    pull_request:
        paths:
            - 'packages/services/identity/**'
            - 'packages/services/identity-webhooks/**'
            - 'packages/apps/sous-chef/web/**'
            - 'packages/apps/sous-chef/mobile/**'
            - '.github/workflows/identity-ci.yml'
            - 'package.json'
            - 'package-lock.json'
            - 'turbo.json'

permissions:
    contents: read

env:
    AWS_REGION: us-east-1

concurrency:
    group: identity-ci-${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    install:
        name: Install dependencies
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: 24
                  cache: npm

    build-ui:
        name: Build @kitchensink/ui
        runs-on: ubuntu-latest
        needs: [install]

        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: 24
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Build UI package
              run: npm run build --workspace=@kitchensink/ui

            - name: Cache UI build artifacts
              uses: actions/cache@v4
              with:
                  path: packages/ui/dist
                  key: ui-build-${{ hashFiles('packages/ui/package.json') }}
                  restore-keys: |
                      ui-build-

    identity-workspace:
        name: ${{ matrix.workspace }}
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                include:
                    - workspace: '@kitchensink/identity-service'
                    - workspace: '@kitchensink/identity-webhooks'
                    - workspace: '@kitchensink/web'
                    - workspace: '@kitchensink/mobile'
        needs: [install, build-ui]

        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: 24
                  cache: npm

            - name: Restore UI build artifacts
              uses: actions/cache@v4
              with:
                  path: packages/ui/dist
                  key: ui-build-${{ hashFiles('packages/ui/package.json') }}
                  restore-keys: |
                      ui-build-

            - name: Configure AWS credentials
              uses: aws-actions/configure-aws-credentials@v4
              with:
                  aws-access-key-id: ${{ vars.AWS_ACCESS_KEY_ID }}
                  aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
                  aws-region: ${{ env.AWS_REGION }}

            - name: Fetch Clerk keys from AWS Secrets Manager
              id: fetch-keys
              run: |
                  SECRET=$(aws secretsmanager get-secret-value --secret-id kitchensink/sandbox/auth/keys --query SecretString --output text)
                  PUBLISHABLE_KEY=$(echo "$SECRET" | jq -r '.publishableKey')
                  SECRET_KEY=$(echo "$SECRET" | jq -r '.secretKey')
                  echo "NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=$PUBLISHABLE_KEY" >> "$GITHUB_ENV"
                  echo "EXPO_PUBLIC_CLERK_PUBLISHABLE_KEY=$PUBLISHABLE_KEY" >> "$GITHUB_ENV"
                  echo "CLERK_SECRET_KEY=$SECRET_KEY" >> "$GITHUB_ENV"

            - name: Lint
              run: npm run lint --workspace=${{ matrix.workspace }}

            - name: Build Next.js (web only)
              if: matrix.workspace == '@kitchensink/web'
              run: npm run build --workspace=${{ matrix.workspace }}

            - name: Typecheck
              run: npm run typecheck --workspace=${{ matrix.workspace }}

            - name: Test
              run: npm run test --workspace=${{ matrix.workspace }}

    e2e:
        name: E2E (${{ matrix.workspace }})
        runs-on: ubuntu-latest
        needs: identity-workspace
        if: false # temporarily disabled - E2E infrastructure under review
        strategy:
            fail-fast: false
            matrix:
                workspace:
                    - '@kitchensink/identity-service'
                    - '@kitchensink/identity-webhooks'
        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: 24
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Run e2e tests
              run: npm run test:e2e --workspace=${{ matrix.workspace }}
