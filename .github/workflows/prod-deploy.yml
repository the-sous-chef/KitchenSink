name: Production Deploy

on:
    push:
        branches: [main]
        paths:
            - 'packages/services/identity-webhooks/**'
            - 'packages/services/identity/**'
            - 'packages/services/identity-webhooks/infra/**'
            - 'packages/services/identity/infra/**'
            - 'Dockerfile'
            - '.github/workflows/prod-deploy.yml'

permissions:
    id-token: write
    contents: read

concurrency:
    group: prod-deploy
    cancel-in-progress: false

env:
    NODE_VERSION: 24
    AWS_REGION: us-east-1
    CDK_DEFAULT_REGION: us-east-1
    STAGE: prod
    DOMAIN_NAME: armoury-app.com

jobs:
    deploy:
        name: Deploy Production
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Build webhooks package
              run: npm run build --workspace=packages/services/identity-webhooks

            - name: Build identity service package
              run: npm run build --workspace=packages/services/identity

            - name: Configure AWS credentials
              uses: aws-actions/configure-aws-credentials@v4
              with:
                  aws-access-key-id: ${{ vars.AWS_ACCESS_KEY_ID }}
                  aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
                  aws-region: ${{ env.AWS_REGION }}

            - name: Login to Amazon ECR
              id: login-ecr
              uses: aws-actions/amazon-ecr-login@v2

            - name: Ensure ECR repository exists
              run: aws ecr describe-repositories --repository-names kitchensink-identity || aws ecr create-repository --repository-name kitchensink-identity

            - name: Build, tag, and push identity service Docker image
              env:
                  ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
                  IMAGE_TAG: ${{ github.sha }}
              run: |
                  docker build -f packages/services/identity/Dockerfile -t kitchensink-identity .
                  docker tag kitchensink-identity:latest ${ECR_REGISTRY}/kitchensink-identity:${IMAGE_TAG}
                  docker push ${ECR_REGISTRY}/kitchensink-identity:${IMAGE_TAG}

            - name: CDK Bootstrap (if needed)
              run: npx cdk bootstrap aws://${{ env.CDK_DEFAULT_ACCOUNT }}/${{ env.AWS_REGION }}

            - name: Build identity service infra
              run: npm run infra:build --workspace=packages/services/identity

            - name: Build identity-webhooks infra
              run: npm run infra:build --workspace=packages/services/identity-webhooks

            - name: CDK Synth (identity service)
              run: STAGE=${{ env.STAGE }} IDENTITY_IMAGE_TAG=${{ github.sha }} npx cdk synth --app "node packages/services/identity/infra/dist/bin/app.js" --all

            - name: CDK Synth (identity-webhooks)
              run: STAGE=${{ env.STAGE }} npx cdk synth --app "node packages/services/identity-webhooks/infra/dist/bin/app.js" --all

            - name: CDK Deploy (identity service)
              run: STAGE=${{ env.STAGE }} IDENTITY_IMAGE_TAG=${{ github.sha }} npx cdk deploy --app "node packages/services/identity/infra/dist/bin/app.js" --all --require-approval never

            - name: CDK Deploy (identity-webhooks)
              run: STAGE=${{ env.STAGE }} npx cdk deploy --app "node packages/services/identity-webhooks/infra/dist/bin/app.js" --all --require-approval never
