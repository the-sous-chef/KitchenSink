name: Production Deploy

on:
    push:
        branches: [main]
        paths:
            - 'packages/infra/global/**'
            - 'packages/services/identity/**'
            - 'packages/services/identity-webhooks/**'
            - 'packages/services/identity-webhooks/infra/**'
            - 'packages/services/identity/infra/**'
            - 'Dockerfile'
            - '.github/workflows/prod-deploy.yml'
    workflow_dispatch:

permissions:
    id-token: write
    contents: read

concurrency:
    group: prod-deploy
    cancel-in-progress: false

env:
    NODE_VERSION: 24
    DEFAULT_AWS_REGION: ${{ vars.DEFAULT_AWS_REGION }}
    CDK_DEFAULT_REGION: ${{ vars.DEFAULT_AWS_REGION }}
    CDK_DEFAULT_ACCOUNT: ${{ vars.AWS_ACCOUNT_ID }}
    STAGE: prod
    DOMAIN_NAME: ${{ vars.DOMAIN_NAME }}
    # Source-map upload (U11). The upload step no-ops until this secret is set.
    SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}

jobs:
    deploy:
        name: Deploy Production
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Build identity service package
              run: npm run build --workspace=packages/services/identity

            - name: Prepare identity service Docker image
              run: npm run docker:prepare --workspace=packages/services/identity

            - name: Build webhooks package
              run: npm run build --workspace=packages/services/identity-webhooks

            # Upload the tsc-emitted .js.map files so Lambda stack traces symbolicate against the
            # commit-SHA release (U11). Guarded on the token + project so it no-ops until configured.
            - name: Upload webhooks Lambda source maps to Sentry
              if: ${{ env.SENTRY_AUTH_TOKEN != '' && vars.SENTRY_WEBHOOKS_PROJECT != '' }}
              continue-on-error: true
              env:
                  SENTRY_ORG: radicle-co
                  SENTRY_PROJECT: ${{ vars.SENTRY_WEBHOOKS_PROJECT }}
              run: |
                  npx @sentry/cli@latest sourcemaps inject packages/services/identity-webhooks/dist
                  npx @sentry/cli@latest sourcemaps upload --release "${{ github.sha }}" packages/services/identity-webhooks/dist

            - name: Build global infra
              run: npm run build --workspace=packages/infra/global

            - name: Build identity service infra
              run: npm run infra:build --workspace=packages/services/identity

            - name: Build identity-webhooks infra
              run: npm run infra:build --workspace=packages/services/identity-webhooks

            - name: Prune dev dependencies
              run: npm prune --omit=dev

            - name: Verify runtime dependencies
              run: |
                  node -e "require('aws-cdk-lib')" || (echo 'FATAL: aws-cdk-lib missing after prune' && exit 1)

            - name: Configure AWS credentials
              uses: aws-actions/configure-aws-credentials@v4
              with:
                  aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
                  aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
                  aws-region: ${{ env.DEFAULT_AWS_REGION }}

            - name: Resolve AWS Account ID
              id: account
              run: |
                  echo "id=$(aws sts get-caller-identity --query Account --output text)" >> "$GITHUB_OUTPUT"

            - name: Login to Amazon ECR
              id: login-ecr
              uses: aws-actions/amazon-ecr-login@v2

            - name: Ensure ECR repository exists
              run: aws ecr describe-repositories --repository-names kitchensink-identity || aws ecr create-repository --repository-name kitchensink-identity

            - name: Build, tag, and push identity service Docker image
              env:
                  ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
                  IMAGE_TAG: ${{ github.sha }}
              run: |
                  docker buildx build --platform linux/amd64 -f packages/services/identity/Dockerfile -t ${ECR_REGISTRY}/kitchensink-identity:${IMAGE_TAG} --push .

            - name: CDK Bootstrap
              run: npx cdk bootstrap aws://${{ steps.account.outputs.id }}/${DEFAULT_AWS_REGION}

            - name: CDK Deploy (global infra)
              run: |
                  STAGE=${{ env.STAGE }} npx cdk deploy --app "node packages/infra/global/dist/bin/app.js" --all --require-approval never

            - name: Resolve Identity VPC ID
              id: identity-vpc
              run: |
                  echo "vpc_id=$(aws cloudformation list-exports --query "Exports[?Name=='kitchensink-identity-network-prod:IdentityVpcId'].Value" --output text)" >> "$GITHUB_OUTPUT"

            - name: CDK Deploy (identity service)
              run: |
                  STAGE=${{ env.STAGE }} IDENTITY_IMAGE_TAG=${{ github.sha }} IDENTITY_VPC_ID=${{ steps.identity-vpc.outputs.vpc_id }} npx cdk deploy --app "node packages/services/identity/infra/dist/bin/app.js" --all --require-approval never

            - name: CDK Deploy (identity-webhooks)
              run: STAGE=${{ env.STAGE }} IDENTITY_VPC_ID=${{ steps.identity-vpc.outputs.vpc_id }} SENTRY_RELEASE=${{ github.sha }} npx cdk deploy --app "node packages/services/identity-webhooks/infra/dist/bin/app.js" --all --require-approval never
