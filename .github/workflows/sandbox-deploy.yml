name: Sandbox Deploy

on:
    workflow_dispatch:
        inputs:
            stage:
                description: 'Sandbox stage name (e.g. sandbox-pr-123, mr-456)'
                required: true
                type: string
            destroy:
                description: 'Destroy sandbox after deploy (test only)'
                required: false
                default: false
                type: boolean
    pull_request:
        types: [opened, synchronize, reopened]
        paths:
            - 'packages/services/identity-webhooks/**'
            - 'packages/services/identity/**'
            - 'packages/services/identity-webhooks/infra/**'
            - 'packages/services/identity/infra/**'
            - 'Dockerfile'
            - '.github/workflows/sandbox-deploy.yml'

permissions:
    id-token: write
    contents: read

concurrency:
    group: sandbox-deploy-${{ github.event.inputs.stage || github.event.pull_request.number }}
    cancel-in-progress: false

env:
    NODE_VERSION: 24
    AWS_REGION: us-east-1
    CDK_DEFAULT_REGION: us-east-1
    NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_ZXhhbXBsZS5jbGVyay5hY2NvdW50cy5kZXYk
    EXPO_PUBLIC_IDP_PUBLISHABLE_KEY: pk_test_ZXhhbXBsZS5jbGVyay5hY2NvdW50cy5kZXYk
    CLERK_SECRET_KEY: sk_test_dummy

jobs:
    deploy:
        name: Deploy Sandbox
        runs-on: ubuntu-latest
        if: ${{ github.event_name == 'workflow_dispatch' || (github.event_name == 'pull_request' && !github.event.pull_request.draft) }}
        env:
            STAGE: ${{ github.event.inputs.stage || format('mr-{0}', github.event.pull_request.number) }}

        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Build webhooks package
              run: npm run build --workspace=packages/services/identity-webhooks

            - name: Build identity service package
              run: npm run build --workspace=packages/services/identity

            - name: Configure AWS credentials
              uses: aws-actions/configure-aws-credentials@v4
              with:
                  role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
                  aws-region: ${{ env.AWS_REGION }}

            - name: Login to Amazon ECR
              id: login-ecr
              uses: aws-actions/amazon-ecr-login@v2

            - name: Build, tag, and push identity service Docker image
              env:
                  ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
                  IMAGE_TAG: ${{ github.sha }}
              run: |
                  cd packages/services/identity
                  docker build -t kitchensink-identity .
                  docker tag kitchensink-identity:latest ${ECR_REGISTRY}/kitchensink-identity:${IMAGE_TAG}
                  docker push ${ECR_REGISTRY}/kitchensink-identity:${IMAGE_TAG}

            - name: CDK Bootstrap (if needed)
              run: npx cdk bootstrap aws://${{ env.CDK_DEFAULT_ACCOUNT }}/${{ env.AWS_REGION }}

            - name: Build identity service infra
              run: npm run infra:build --workspace=packages/services/identity

            - name: Build identity-webhooks infra
              run: npm run infra:build --workspace=packages/services/identity-webhooks

            - name: CDK Synth (identity service)
              run: STAGE=${{ env.STAGE }} IDENTITY_IMAGE_TAG=${{ github.sha }} npx cdk synth --app "node packages/services/identity/infra/dist/bin/app.js" --all

            - name: CDK Synth (identity-webhooks)
              run: STAGE=${{ env.STAGE }} npx cdk synth --app "node packages/services/identity-webhooks/infra/dist/bin/app.js" --all

            - name: CDK Deploy (identity service)
              if: ${{ !github.event.inputs.destroy }}
              run: STAGE=${{ env.STAGE }} IDENTITY_IMAGE_TAG=${{ github.sha }} npx cdk deploy --app "node packages/services/identity/infra/dist/bin/app.js" --all --require-approval never

            - name: CDK Deploy (identity-webhooks)
              if: ${{ !github.event.inputs.destroy }}
              run: STAGE=${{ env.STAGE }} npx cdk deploy --app "node packages/services/identity-webhooks/infra/dist/bin/app.js" --all --require-approval never

            - name: CDK Destroy (test cleanup)
              if: ${{ github.event.inputs.destroy == true }}
              run: |
                STAGE=${{ env.STAGE }} npx cdk destroy --app "node packages/services/identity/infra/dist/bin/app.js" --all --force
                STAGE=${{ env.STAGE }} npx cdk destroy --app "node packages/services/identity-webhooks/infra/dist/bin/app.js" --all --force

    cleanup-pr-sandbox:
        name: Cleanup PR Sandbox
        runs-on: ubuntu-latest
        if: github.event_name == 'pull_request' && github.event.action == 'closed'
        env:
            STAGE: ${{ format('mr-{0}', github.event.pull_request.number) }}

        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Build identity service infra
              run: npm run infra:build --workspace=packages/services/identity

            - name: Build identity-webhooks infra
              run: npm run infra:build --workspace=packages/services/identity-webhooks

            - name: Configure AWS credentials
              uses: aws-actions/configure-aws-credentials@v4
              with:
                  role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
                  aws-region: ${{ env.AWS_REGION }}

            - name: CDK Destroy (identity service)
              run: STAGE=${{ env.STAGE }} npx cdk destroy --app "node packages/services/identity/infra/dist/bin/app.js" --all --force

            - name: CDK Destroy (identity-webhooks)
              run: STAGE=${{ env.STAGE }} npx cdk destroy --app "node packages/services/identity-webhooks/infra/dist/bin/app.js" --all --force
