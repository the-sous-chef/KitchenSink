name: Sandbox Deploy

on:
    workflow_dispatch:
        inputs:
            stage:
                description: 'Sandbox stage name (e.g. sandbox-pr-123, pr-7)'
                required: true
                type: string
            destroy:
                description: 'Destroy sandbox after deploy (test only)'
                required: false
                default: false
                type: boolean
    pull_request:
        types: [opened, synchronize, reopened, closed]
        paths:
            - 'packages/services/identity/**'
            - 'packages/services/identity-webhooks/**'
            - 'packages/services/identity-webhooks/infra/**'
            - 'packages/services/identity/infra/**'
            - 'Dockerfile'
            - '.github/workflows/sandbox-deploy.yml'

permissions:
    id-token: write
    contents: read

concurrency:
    group: sandbox-deploy-${{ github.event.inputs.stage || format('pr-{0}', github.event.pull_request.number) }}
    cancel-in-progress: false

env:
    NODE_VERSION: 24
    AWS_REGION: ${{ vars.AWS_REGION }}
    CDK_DEFAULT_REGION: ${{ vars.AWS_REGION }}
    CDK_DEFAULT_ACCOUNT: ${{ vars.CDK_DEFAULT_ACCOUNT }}
    DOMAIN_NAME: ${{ vars.DOMAIN_NAME }}

jobs:
    deploy-sandbox:
        name: Deploy sandbox (${{ github.event.inputs.stage || format('pr-{0}', github.event.pull_request.number) }})
        runs-on: ubuntu-latest
        if: github.event_name != 'pull_request' || github.event.action != 'closed'
        env:
            STAGE: ${{ github.event.inputs.stage || format('pr-{0}', github.event.pull_request.number) }}

        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Build identity service package
              run: npm run build --workspace=packages/services/identity

            - name: Build webhooks package
              run: npm run build --workspace=packages/services/identity-webhooks

            - name: Build identity service infra
              run: npm run infra:build --workspace=packages/services/identity

            - name: Build identity-webhooks infra
              run: npm run infra:build --workspace=packages/services/identity-webhooks

            - name: Prune dev dependencies
              run: npm prune --omit=dev

            - name: Configure AWS credentials
              uses: aws-actions/configure-aws-credentials@v4
              with:
                  aws-access-key-id: ${{ vars.AWS_ACCESS_KEY_ID }}
                  aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
                  aws-region: ${{ env.AWS_REGION }}

            - name: Login to Amazon ECR
              id: login-ecr
              uses: aws-actions/amazon-ecr-login@v2

            - name: Ensure ECR repository exists
              run: aws ecr describe-repositories --repository-names kitchensink-identity || aws ecr create-repository --repository-name kitchensink-identity

            - name: Build, tag, and push identity service Docker image
              env:
                  ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
                  IMAGE_TAG: ${{ github.sha }}
              run: |
                  docker build --platform linux/arm64 -f packages/services/identity/Dockerfile -t kitchensink-identity .
                  docker tag kitchensink-identity:latest ${ECR_REGISTRY}/kitchensink-identity:${IMAGE_TAG}
                  docker push ${ECR_REGISTRY}/kitchensink-identity:${IMAGE_TAG}

            - name: CDK Bootstrap
              run: npx cdk bootstrap aws://${CDK_DEFAULT_ACCOUNT}/${AWS_REGION}

            - name: CDK Deploy (identity service)
              if: ${{ !github.event.inputs.destroy }}
              run: STAGE=${{ env.STAGE }} IDENTITY_IMAGE_TAG=${{ github.sha }} npx cdk deploy --app "node packages/services/identity/infra/dist/bin/app.js" --all --require-approval never

            - name: CDK Deploy (identity-webhooks)
              if: ${{ !github.event.inputs.destroy }}
              run: STAGE=${{ env.STAGE }} npx cdk deploy --app "node packages/services/identity-webhooks/infra/dist/bin/app.js" --all --require-approval never

            - name: CDK Destroy (test cleanup)
              if: ${{ github.event.inputs.destroy == true }}
              run: |
                  STAGE=${{ env.STAGE }} npx cdk destroy --app "node packages/services/identity/infra/dist/bin/app.js" --all --force
                  STAGE=${{ env.STAGE }} npx cdk destroy --app "node packages/services/identity-webhooks/infra/dist/bin/app.js" --all --force

    cleanup-sandbox:
        name: Cleanup sandbox (pr-${{ github.event.pull_request.number }})
        runs-on: ubuntu-latest
        if: github.event_name == 'pull_request' && github.event.action == 'closed'
        env:
            STAGE: ${{ format('pr-{0}', github.event.pull_request.number) }}

        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Build identity service infra
              run: npm run infra:build --workspace=packages/services/identity

            - name: Build identity-webhooks infra
              run: npm run infra:build --workspace=packages/services/identity-webhooks

            - name: Configure AWS credentials
              uses: aws-actions/configure-aws-credentials@v4
              with:
                  aws-access-key-id: ${{ vars.AWS_ACCESS_KEY_ID }}
                  aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
                  aws-region: ${{ env.AWS_REGION }}

            - name: CDK Destroy (identity service)
              run: STAGE=${{ env.STAGE }} npx cdk destroy --app "node packages/services/identity/infra/dist/bin/app.js" --all --force
              continue-on-error: true

            - name: CDK Destroy (identity-webhooks)
              run: STAGE=${{ env.STAGE }} npx cdk destroy --app "node packages/services/identity-webhooks/infra/dist/bin/app.js" --all --force
              continue-on-error: true
