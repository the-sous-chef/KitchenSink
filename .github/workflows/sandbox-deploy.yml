name: Sandbox Deploy

on:
    workflow_dispatch:
        inputs:
            service:
                description: 'Service to sandbox deploy (e.g. payments, notifications)'
                required: true
                type: string
            stage:
                description: 'Sandbox stage name (e.g. pr-15, team-feature-x)'
                required: true
                type: string
    pull_request:
        types: [opened, synchronize, reopened, closed]
        # Runs for ALL PRs. Per-service path filters are on each job.
        # Identity services are global and NEVER sandboxed — skip them here.

permissions:
    id-token: write
    contents: read

concurrency:
    group: sandbox-deploy-${{ github.event.inputs.stage || format('pr-{0}', github.event.pull_request.number) }}
    cancel-in-progress: false

env:
    NODE_VERSION: 24
    DEFAULT_AWS_REGION: ${{ vars.DEFAULT_AWS_REGION }}
    CDK_DEFAULT_REGION: ${{ vars.DEFAULT_AWS_REGION }}
    CDK_DEFAULT_ACCOUNT: ${{ vars.AWS_ACCOUNT }}
    DOMAIN_NAME: ${{ vars.DOMAIN_NAME }}

jobs:
    # ── Cleanup: PR closed → destroy all sandbox stacks for this PR ──
    cleanup:
        name: Destroy sandbox (pr-${{ github.event.pull_request.number }})
        runs-on: ubuntu-latest
        if: github.event_name == 'pull_request' && github.event.action == 'closed'
        env:
            STAGE: pr-${{ github.event.pull_request.number }}

        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Configure AWS credentials
              uses: aws-actions/configure-aws-credentials@v4
              with:
                  aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
                  aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
                  aws-region: ${{ env.DEFAULT_AWS_REGION }}

            - name: Destroy all PR sandbox stacks
              run: |
                  echo "Cleaning up all sandbox stacks for stage=$STAGE"
                  STACKS=$(aws cloudformation describe-stacks \
                    --query "Stacks[?contains(StackName, '-$STAGE')].StackName" \
                    --output text 2>/dev/null || true)

                  if [ -z "$STACKS" ]; then
                    echo "No sandbox stacks found for $STAGE"
                    exit 0
                  fi

                  for stack in $STACKS; do
                    echo "Destroying stack: $stack"
                    aws cloudformation delete-stack --stack-name "$stack"
                  done

                  echo "Waiting for stack deletion to complete..."
                  for stack in $STACKS; do
                    aws cloudformation wait stack-delete-complete --stack-name "$stack" || \
                      echo "Warning: $stack may still be deleting (timeout or in progress)"
                  done
                  echo "Sandbox cleanup complete"

    # ═══════════════════════════════════════════════════════════════════
    # Per-service sandbox deploy jobs.
    #
    # Copy the template below for each new service. For each job:
    #   1. paths: filter ensures it only runs when that service changed
    #   2. Deploys with stage=pr-{N} to kitchensink-{service}-*-pr-{N} stacks
    #   3. Uses domain: {service}-pr-{N}.commise.app (fits *.commise.app wildcard cert)
    #
    # ⚠️  Never add identity services here — they are global.
    #     Identity deploys via prod-deploy.yml → identity.commise.app only.
