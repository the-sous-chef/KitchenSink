# @implements REQ-049 REQ-050 REQ-017 REQ-025 REQ-026 FR-017 FR-025 FR-026 ARCH-012 ARCH-017 ARCH-031 MOD-012 MOD-017 MOD-031
services:
    localstack:
        image: localstack/localstack:3.5
        container_name: kitchensink-identity-localstack
        environment:
            SERVICES: sqs,s3,events
            EDGE_PORT: 4566
            AWS_DEFAULT_REGION: us-east-1
            DEBUG: 0
        ports:
            - '4566:4566'
        healthcheck:
            test: ['CMD-SHELL', 'curl -fs http://localhost:4566/_localstack/health | grep -q ''"running"''']
            interval: 10s
            timeout: 5s
            retries: 30
        volumes:
            - localstack-data:/var/lib/localstack

    postgres:
        image: postgres:16-alpine
        container_name: kitchensink-identity-postgres
        environment:
            POSTGRES_DB: identity
            POSTGRES_USER: identity
            POSTGRES_PASSWORD: identity
        ports:
            - '5432:5432'
        healthcheck:
            test: ['CMD-SHELL', 'pg_isready -U identity -d identity']
            interval: 10s
            timeout: 5s
            retries: 20
        volumes:
            - postgres-data:/var/lib/postgresql/data

volumes:
    localstack-data:
    postgres-data:
