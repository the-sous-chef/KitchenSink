version: '3.8'

services:
    postgres:
        image: postgres:16-alpine
        container_name: kitchensink-identity-postgres
        environment:
            POSTGRES_USER: identity_app
            POSTGRES_PASSWORD: localdev
            POSTGRES_DB: kitchensink_identity
        ports:
            - '5432:5432'
        volumes:
            - postgres_data:/var/lib/postgresql/data
        healthcheck:
            test: ['CMD-SHELL', 'pg_isready -U identity_app -d kitchensink_identity']
            interval: 5s
            timeout: 5s
            retries: 5

    localstack:
        image: localstack/localstack:latest
        container_name: kitchensink-localstack
        environment:
            SERVICES: sqs,s3,secretsmanager,ssm,events
            DEFAULT_REGION: us-east-1
            AWS_ACCESS_KEY_ID: test
            AWS_SECRET_ACCESS_KEY: test
        ports:
            - '4566:4566'
            - '4571:4571'
        volumes:
            - localstack_data:/var/lib/localstack
            - /var/run/docker.sock:/var/run/docker.sock
        healthcheck:
            test: ['CMD', 'curl', '-f', 'http://localhost:4566/_localstack/health']
            interval: 5s
            timeout: 5s
            retries: 10

volumes:
    postgres_data:
    localstack_data:
