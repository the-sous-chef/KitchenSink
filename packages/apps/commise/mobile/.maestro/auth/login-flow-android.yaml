appId: io.commise.mobile
---
- launchApp:
      clearState: true

- assertVisible: 'Commise'
- assertVisible: 'Email'
- assertVisible: 'Password'
- assertVisible: 'Sign in'

- tapOn: 'Sign up'
- assertVisible: 'Create your account'

- tapOn: 'Email'
- inputText: 'maestro+clerk_test@example.com'

- tapOn: 'Password'
- inputText: 'TestPassword123!'

- tapOn: 'Create account'

- runFlow:
      when:
          visible: 'Verification'
      commands:
          - inputText: '424242'

- tapOn: 'Sign in'
- tapOn: 'Email'
- inputText: 'maestro+clerk_test@example.com'

- tapOn: 'Password'
- inputText: 'TestPassword123!'

- tapOn: 'Sign in'

- assertVisible:
      id: 'profile-screen'
      timeout: 10000
